[build]
  publish = "dist"
  command = "node scripts/build_property_pages.mjs && node scripts/build_dist.mjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/Liora_Living_COLOR_SKETCH_HOME.html"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
