<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 300" role="img" aria-labelledby="title desc">
  <title id="title">Liora Living modern reverse wordmark</title>
  <desc id="desc">A reverse text-only Liora Living logo for dark luxury backgrounds.</desc>
  <rect width="1040" height="300" fill="#17211d" />
  <style>
    :root {
      --ivory: #f7f0e5;
      --gold: #c4a66a;
      --mist: #c7d0c8;
    }

    .main {
      fill: var(--ivory);
      font-family: "Optima", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 86px;
      font-weight: 400;
      letter-spacing: 11px;
      text-anchor: middle;
    }

    .small {
      fill: var(--mist);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 5.2px;
    }

    .small-left {
      text-anchor: end;
    }

    .small-right {
      text-anchor: start;
    }
  </style>

  <text class="main" x="520" y="139">LIORA LIVING</text>
  <line x1="298" y1="180" x2="742" y2="180" stroke="#c4a66a" stroke-width="2" />
  <line x1="492" y1="207" x2="492" y2="226" stroke="#c4a66a" stroke-width="1.3" />
  <text class="small small-left" x="458" y="222">COSTA DEL SOL</text>
  <text class="small small-right" x="526" y="222">NEW DEVELOPMENTS</text>
</svg>
