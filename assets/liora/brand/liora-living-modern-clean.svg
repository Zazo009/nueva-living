<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-labelledby="title desc">
  <title id="title">Liora Living modern clean wordmark</title>
  <desc id="desc">A clean text-only Liora Living wordmark in a quiet modern luxury style.</desc>
  <style>
    :root {
      --ink: #17211d;
      --gold: #b9975b;
    }

    .main {
      fill: var(--ink);
      font-family: "Optima", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 86px;
      font-weight: 400;
      letter-spacing: 11px;
      text-anchor: middle;
    }
  </style>

  <text class="main" x="480" y="112">LIORA LIVING</text>
  <line x1="288" y1="154" x2="672" y2="154" stroke="#b9975b" stroke-width="2" />
</svg>
