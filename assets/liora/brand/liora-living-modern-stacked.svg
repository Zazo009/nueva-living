<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" role="img" aria-labelledby="title desc">
  <title id="title">Liora Living modern stacked wordmark</title>
  <desc id="desc">A stacked text-only Liora Living wordmark for square and vertical layouts.</desc>
  <style>
    :root {
      --ink: #17211d;
      --gold: #b9975b;
      --sage: #65766c;
    }

    .liora {
      fill: var(--ink);
      font-family: "Optima", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 82px;
      font-weight: 400;
      letter-spacing: 12px;
      text-anchor: middle;
    }

    .living {
      fill: var(--ink);
      font-family: "Optima", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 72px;
      font-weight: 400;
      letter-spacing: 12px;
      text-anchor: middle;
    }

    .small {
      fill: var(--sage);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 4.4px;
      text-anchor: middle;
    }
  </style>

  <text class="liora" x="310" y="132">LIORA</text>
  <text class="living" x="310" y="214">LIVING</text>
  <line x1="150" y1="262" x2="470" y2="262" stroke="#b9975b" stroke-width="2" />
  <text class="small" x="312" y="310">COSTA DEL SOL</text>
  <text class="small" x="312" y="338">NEW DEVELOPMENTS</text>
</svg>
