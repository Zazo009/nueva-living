<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 300" role="img" aria-labelledby="title desc">
  <title id="title">Liora Living modern primary wordmark</title>
  <desc id="desc">A text-only Liora Living logo in a quiet modern luxury style with Costa del Sol new developments descriptor.</desc>
  <style>
    :root {
      --ink: #17211d;
      --gold: #b9975b;
      --sage: #65766c;
    }

    .main {
      fill: var(--ink);
      font-family: "Optima", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 86px;
      font-weight: 400;
      letter-spacing: 11px;
      text-anchor: middle;
    }

    .small {
      fill: var(--sage);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 5.2px;
    }

    .small-left {
      text-anchor: end;
    }

    .small-right {
      text-anchor: start;
    }
  </style>

  <text class="main" x="520" y="139">LIORA LIVING</text>
  <line x1="298" y1="180" x2="742" y2="180" stroke="#b9975b" stroke-width="2" />
  <line x1="492" y1="207" x2="492" y2="226" stroke="#b9975b" stroke-width="1.3" />
  <text class="small small-left" x="458" y="222">COSTA DEL SOL</text>
  <text class="small small-right" x="526" y="222">NEW DEVELOPMENTS</text>
</svg>
