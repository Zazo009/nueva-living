<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Liora Living primary logo</title>
  <desc id="desc">Liora Living logo on a warm off-white background.</desc>
  <defs>
    <radialGradient id="paperGlow" cx="50%" cy="46%" r="76%">
      <stop offset="0" stop-color="#fffdf9"/>
      <stop offset="0.54" stop-color="#faf6ef"/>
      <stop offset="1" stop-color="#f1ebe3"/>
    </radialGradient>
    <linearGradient id="bronze" x1="430" x2="1110" y1="210" y2="875" gradientUnits="userSpaceOnUse">
