      <stop offset="0.38" stop-color="#8f7750"/>
      <stop offset="0.72" stop-color="#766342"/>
      <stop offset="1" stop-color="#b79a63"/>
    </linearGradient>
    <filter id="softInk" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
