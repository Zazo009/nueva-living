<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Liora Living light wordmark</title>
  <desc id="desc">Transparent light Liora Living wordmark for dark backgrounds.</desc>
  <defs>
    <linearGradient id="warmLight" x1="430" x2="1110" y1="210" y2="875" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8e8be"/>
      <stop offset="0.5" stop-color="#d2b47a"/>
      <stop offset="1" stop-color="#f0d79d"/>
    </linearGradient>
    <filter id="softLight" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-color="#ffffff" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g fill="url(#warmLight)" filter="url(#softLight)">
    <g transform="translate(768 350) scale(.88)">
      <path d="M-116-192c42 0 69 0 103-3v10c-35 4-45 18-45 55v238c0 37 12 51 47 55v10h-141v-10c35-4 47-18 47-55v-238c0-37-10-51-45-55v-10c11 2 22 3 34 3z"/>
      <path d="M6-76c30 0 58-1 86-4v10c-29 4-38 16-38 48v132c0 28 11 42 38 49v10h-124v-10c27-7 38-21 38-49v-132c0-32-9-44-38-48v-10c13 2 25 4 38 4z"/>
      <path d="M-73 147c128 65 307 103 385-15-26 119-178 138-397 34l12-19z"/>
    </g>
    <text x="768" y="690" text-anchor="middle" font-family="Didot, 'Bodoni 72', 'Times New Roman', serif" font-size="132" font-weight="400" textLength="850" lengthAdjust="spacing">LIORA</text>
    <line x1="338" y1="768" x2="478" y2="768" stroke="url(#warmLight)" stroke-width="1.4"/>
    <line x1="1058" y1="768" x2="1198" y2="768" stroke="url(#warmLight)" stroke-width="1.4"/>
    <text x="768" y="792" text-anchor="middle" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" textLength="462" lengthAdjust="spacing">LIVING</text>
    <text x="768" y="858" text-anchor="middle" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" textLength="690" lengthAdjust="spacing">NEW DEVELOPMENTS. INSPIRED LIVING.</text>
